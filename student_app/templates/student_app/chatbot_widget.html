{# student_app/templates/student_app/chatbot_widget.html #}
{# يُدرَج داخل lesson_session.html بـ: {% include 'student_app/chatbot_widget.html' %} #}
{% load static %}

<style>
/* زر الفتح العائم */
#chat-fab{
  position:fixed;bottom:2.5rem;left:3.5rem;
  width:5rem;height:5rem;border-radius:50%;
background:linear-gradient(145deg,#5f958c,#315b59);
  color:#fff;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:1.35rem;z-index:1100;
  box-shadow:0 10px 24px rgba(49,91,89,.25);
  transition:transform .2s,box-shadow .2s;
  padding:.4rem;
}
#chat-fab img{
  position:absolute;
  top:50%;
  left:50%;
  width:115%;
  max-width:none;
  height:auto;
  clip-path:circle(38.3% at 50% 50%);
  transform:translate(-50%,-50%);
  pointer-events:none;
}
#chat-fab:hover{transform:translateY(-4px) rotate(-2deg);box-shadow:0 16px 28px rgba(64,58,50,.28);}
#chat-fab:active{transform:translateY(5px);box-shadow:0 5px 12px rgba(64,58,50,.2);}
.fab-badge{
  position:absolute;top:-4px;right:-4px;
  background:#ef4444;color:#fff;border-radius:50%;
  width:20px;height:20px;font-size:.65rem;font-weight:800;
  display:none;align-items:center;justify-content:center;
  border:2px solid #fff;
}

/* نافذة الشات */
#chat-panel{
  position:fixed;bottom:5.5rem;left:1.75rem;
  width:340px;max-width:calc(100vw - 2rem);
  height:480px;max-height:70vh;
  background:#fff;border-radius:1.25rem;
  box-shadow:0 12px 48px rgba(0,0,0,.18);
  display:flex;flex-direction:column;
  z-index:1099;overflow:hidden;
  transform:scale(.92) translateY(20px);opacity:0;
  transition:transform .25s cubic-bezier(.34,1.56,.64,1),opacity .2s;
  pointer-events:none;
}
#chat-panel.open{transform:none;opacity:1;pointer-events:auto;}

/* رأس الشات */
.chat-head{
  background:linear-gradient(135deg,#315b59,#6c9c89);
  color:#fff;padding:.85rem 1.1rem;
  display:flex;align-items:center;gap:.6rem;flex-shrink:0;
}
.chat-head-icon{
  width:38px;height:38px;background:rgba(255,255,255,.2);
  border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:1.05rem;flex-shrink:0;overflow:hidden;
}
.chat-head-icon img{
  width:100%;height:100%;object-fit:cover;
}
.chat-head-info{flex:1;}
.chat-head-title{font-size:.9rem;font-weight:800;line-height:1.2;}
.chat-head-sub{font-size:.72rem;opacity:.82;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px;}
.chat-close{
  background:rgba(255,255,255,.18);border:none;color:#fff;
  width:30px;height:30px;border-radius:8px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:.9rem;
  transition:background .15s;flex-shrink:0;
}
.chat-close:hover{background:rgba(255,255,255,.32);}
.chat-quota{
  font-size:.7rem;color:rgba(255,255,255,.75);
  padding:.22rem .65rem;background:rgba(255,255,255,.12);
  border-radius:2rem;white-space:nowrap;flex-shrink:0;
}

/* منطقة الرسائل */
#chat-messages{
  flex:1;overflow-y:auto;padding:.85rem;
  display:flex;flex-direction:column;gap:.65rem;
  scroll-behavior:smooth;
}
#chat-messages::-webkit-scrollbar{width:4px;}
#chat-messages::-webkit-scrollbar-thumb{background:#e2e8f0;border-radius:4px;}

/* فقاعات الرسائل */
.chat-msg{
  max-width:86%;padding:.6rem .85rem;border-radius:1rem;
  font-size:.84rem;line-height:1.6;word-break:break-word;
  font-family:'Tajawal',sans-serif;
  position:relative;
}
.chat-msg.user{
  align-self:flex-start;
  background:#eff6ff;color:#1d4ed8;
  border-bottom-left-radius:.25rem;border:1px solid #bfdbfe;
}
.chat-msg.bot{
  align-self:flex-end;
  background:#f1f5f9;color:#1e293b;
  border-bottom-right-radius:.25rem;border:1px solid #e2e8f0;
}
.chat-msg.error-msg{
  align-self:flex-end;
  background:#fef2f2;color:#dc2626;border:1px solid #fecaca;
}
.msg-content{
  margin-right:30px;
}
.voice-btn{
  position:absolute;
  top:5px;
  left:5px;
  width:24px;
  height:24px;
  border:none;
  background:rgba(49,91,89,.1);
  color:#315b59;
  border-radius:50%;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:.7rem;
  transition:all .2s ease;
}
.voice-btn:hover{
  background:rgba(49,91,89,.2);
  transform:scale(1.1);
}
.voice-btn.playing{
  background:#315b59;
  color:#fff;
  animation:pulse 1.5s infinite;
}
@keyframes pulse{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.15);}
}
.word{
  display:inline;
  transition:background .2s ease,color .2s ease;
  padding:0 2px;
  border-radius:3px;
}
.word.highlighted{
  background:rgba(49,91,89,.15);
  color:#315b59;
  font-weight:600;
}
.typing-dots{display:flex;gap:4px;padding:.2rem .4rem;align-items:center;}
.typing-dots span{
  width:7px;height:7px;border-radius:50%;
  background:#94a3b8;animation:dotBounce 1.2s infinite;
}
.typing-dots span:nth-child(2){animation-delay:.2s;}
.typing-dots span:nth-child(3){animation-delay:.4s;}
@keyframes dotBounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-6px);}}

.chat-welcome{
  text-align:center;padding:.75rem;color:#64748b;
  font-size:.8rem;line-height:1.7;font-family:'Tajawal',sans-serif;
}
.chat-welcome strong{color:#6c9c89;display:block;margin-bottom:.3rem;font-size:.87rem;}

/* منطقة الإدخال */
.chat-input-area{
  padding:.65rem .85rem;border-top:1.5px solid #e2e8f0;
  display:flex;align-items:flex-end;gap:.4rem;flex-shrink:0;background:#fff;
}
#chat-input{
  flex:1;resize:none;border:1.5px solid #e2e8f0;border-radius:.75rem;
  padding:.5rem .8rem;font-family:'Tajawal',sans-serif;font-size:.84rem;
  color:#1e293b;background:#fafbfd;line-height:1.5;
  max-height:90px;overflow-y:auto;outline:none;direction:rtl;
  transition:border-color .18s;
}
#chat-input:focus{border-color:#3b82f6;}

/* أزرار الإجراءات */
.chat-btn{
  width:36px;height:36px;border-radius:10px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;border:none;transition:all 0.2s;
}
#chat-send{
  background:linear-gradient(135deg,#315b59,#6c9c89);
}
#chat-send:hover{background:#3b82f6;}
#chat-send:disabled{opacity:.45;cursor:not-allowed;}

/* زر الميكروفون */
#chat-mic-btn {
  background: #f1f5f9; color: #64748b;
}
#chat-mic-btn.active {
  background: #fee2e2; color: #ef4444;
  animation: micPulse 1.5s infinite;
}
@keyframes micPulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.1); }
  100% { transform: scale(1); }
}
</style>

<div id="chat-config"
      data-chat-url="{% url 'student:lesson_chat' lesson_id=lesson.lessonid %}"
      data-csrf="{{ csrf_token }}"
      data-limit="{{ student.daily_chat_limit|default:20 }}"
      data-used="{{ student.chats_today|default:0 }}"
      data-lesson-title="{{ lesson.lessontitle|default:'الدرس'|truncatechars:40 }}"
      style="display:none;"></div>

<button id="chat-fab" onclick="toggleChat()" title="اسأل المساعد الذكي">
  <img src="{% static 'images/rafiq-avatar.jpeg' %}" alt="رفيق">
  <span class="fab-badge" id="fab-badge"></span>
</button>

<div id="chat-panel">
  <div class="chat-head">
    <div class="chat-head-icon">
      <img src="{% static 'images/rafiq-avatar.jpeg' %}" alt="رفيق">
    </div>
    <div class="chat-head-info">
      <div class="chat-head-title">مساعد الدرس الذكي</div>
      <div class="chat-head-sub" id="chat-lesson-title">—</div>
    </div>
    <span class="chat-quota" id="chat-quota-badge">—</span>
    <button class="chat-close" onclick="toggleChat()"><i class="fas fa-times"></i></button>
  </div>

  <div id="chat-messages">
    <div class="chat-welcome">
      <strong>أهلاً! أنا مساعدك الذكي</strong>
      اسألني عن أي شيء يخص هذا الدرس وسأساعدك على الفهم
    </div>
  </div>

  <div class="chat-input-area">
    <button id="chat-mic-btn" class="chat-btn" onclick="toggleSpeech()" title="تحدث لسؤال المساعد">
      <i class="fas fa-microphone"></i>
    </button>
    
    <textarea id="chat-input" placeholder="اسأل عن الدرس..." rows="1"
      onkeydown="handleChatKey(event)" oninput="autoResize(this)"></textarea>
    
    <button id="chat-send" class="chat-btn" onclick="sendChat()" title="إرسال">
      <i class="fas fa-paper-plane" style="color: #fff;"></i>
    </button>
  </div>
</div>

<script>
(function(){
  'use strict';

  var _cfg = document.getElementById('chat-config');
  var _chatUrl = _cfg ? _cfg.dataset.chatUrl : '';
  var _csrf = _cfg ? _cfg.dataset.csrf : '';
  var _chatLimit = _cfg ? parseInt(_cfg.dataset.limit || '20') : 20;
  var _chatUsed = _cfg ? parseInt(_cfg.dataset.used || '0') : 0;
  
  var chatOpen = false;
  var chatLoading = false;
  var chatRemaining = _chatLimit - _chatUsed;
  var chatHistory = [];
  var currentAudio = null; // لتخزين كائن الصوت النشط

  // --- نظام التعرف على الكلام (Speech Recognition) ---
  var recognition = null;
  var isRecognizing = false;

  function initSpeech() {
    if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) return;
    
    var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SpeechRecognition();
    recognition.lang = 'ar-SA';
    recognition.interimResults = true;
    recognition.continuous = false;

    recognition.onstart = function() {
      isRecognizing = true;
      document.getElementById('chat-mic-btn').classList.add('active');
    };

    recognition.onresult = function(event) {
      var transcript = "";
      for (var i = event.resultIndex; i < event.results.length; ++i) {
        transcript += event.results[i][0].transcript;
      }
      var inp = document.getElementById('chat-input');
      if (inp) {
        inp.value = transcript;
        window.autoResize(inp);
      }
    };

    recognition.onerror = function(event) {
      console.error("Speech Error:", event.error);
      if (event.error === 'not-allowed') {
          alert("يرجى السماح بالوصول للميكروفون من إعدادات المتصفح (أيقونة القفل بجانب الرابط).");
      }
      stopSpeechUI();
    };

    recognition.onend = function() {
      stopSpeechUI();
    };
  }

  window.toggleSpeech = function() {
    if (!recognition) initSpeech();
    if (!recognition) {
      alert("متصفحك لا يدعم التعرف على الصوت.");
      return;
    }

    if (isRecognizing) {
      recognition.stop();
    } else {
      try {
        recognition.start();
      } catch (e) {
        console.error("Mic start error:", e);
      }
    }
  };

  function stopSpeechUI() {
    isRecognizing = false;
    var btn = document.getElementById('chat-mic-btn');
    if(btn) btn.classList.remove('active');
  }

  // --- نظام توليد الصوت (Text-to-Speech) ---
  async function playRafiqVoice(text) {
    try {
      // إيقاف أي صوت نشط
      if (currentAudio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
        currentAudio = null;
      }

      const response = await fetch('/api/generate-voice/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: text })
      });

      if (!response.ok) throw new Error('Voice generation failed');

      const audioBlob = await response.blob();
      const audioUrl = URL.createObjectURL(audioBlob);
      const audio = new Audio(audioUrl);
      
      currentAudio = audio;

      return new Promise((resolve, reject) => {
        audio.addEventListener('ended', () => {
          URL.revokeObjectURL(audioUrl);
          currentAudio = null;
          resolve();
        });
        audio.addEventListener('error', (e) => {
          URL.revokeObjectURL(audioUrl);
          currentAudio = null;
          reject(e);
        });
        audio.play().catch(err => {
          console.log(err);
          currentAudio = null;
          reject(err);
        });
      });

    } catch (error) {
      console.error('Error playing voice:', error);
      currentAudio = null;
    }
  }

  function stopVoice() {
    if (currentAudio) {
      currentAudio.pause();
      currentAudio.currentTime = 0;
      currentAudio = null;
    }
  }

  // تشغيل صوت رسالة معينة مع تظليل الكلمات
  window.playMessageVoice = function(btn) {
    var msgDiv = btn.closest('.chat-msg');
    var contentDiv = msgDiv.querySelector('.msg-content');
    var text = contentDiv ? contentDiv.innerText : '';
    
    if (!text) return;
    
    // إذا كان الصوت يعمل، أوقفه
    if (btn.classList.contains('playing')) {
      stopVoice();
      btn.classList.remove('playing');
      // إعادة النص الأصلي
      if (contentDiv) contentDiv.innerText = text;
      return;
    }
    
    // إيقاف أي صوت نشط
    stopVoice();
    
    // تغيير حالة الزر
    document.querySelectorAll('.voice-btn').forEach(function(b) {
      b.classList.remove('playing');
    });
    btn.classList.add('playing');
    
    // تقسيم النص إلى كلمات للتظليل
    var words = text.split(/\s+/);
    contentDiv.innerHTML = words.map(function(word, index) {
      return '<span class="word" data-index="' + index + '">' + word + '</span>';
    }).join(' ');
    
    // تشغيل الصوت
    playRafiqVoice(text).then(function() {
      btn.classList.remove('playing');
      // إعادة النص الأصلي
      contentDiv.innerText = text;
    }).catch(function() {
      btn.classList.remove('playing');
      contentDiv.innerText = text;
    });
    
    // تظليل الكلمات بشكل متتابع (تقريبي)
    var wordElements = contentDiv.querySelectorAll('.word');
    var duration = 3000; // تقدير مدة الصوت بالمللي ثانية
    var wordDelay = duration / words.length;
    
    wordElements.forEach(function(wordEl, index) {
      setTimeout(function() {
        wordElements.forEach(function(w) {
          w.classList.remove('highlighted');
        });
        wordEl.classList.add('highlighted');
      }, index * wordDelay);
    });
  };

  // --- وظائف الشات الأساسية ---
  window.toggleChat = function() {
    chatOpen = !chatOpen;
    var panel = document.getElementById('chat-panel');
    var fab = document.getElementById('chat-fab');
    if(!panel) return;

    panel.classList.toggle('open', chatOpen);
    // لا نغير innerHTML لأن الصورة موجودة بالفعل

    if (chatOpen) {
      // إيقاف الصوت عند فتح المساعد الذكي
      stopVoice();
      
      // إيقاف تتبع الانتباه إذا كان يعمل
      if (typeof stopAttentionTracking === 'function') {
        stopAttentionTracking();
      }
      
      // إيقاف التسجيل الصوتي إذا كان يعمل
      if (isRecognizing) {
        recognition.stop();
      }
      
      // إيقاف الصوت/الفيديو عند فتح المساعد الذكي
      var audio = document.getElementById('topAudio');
      if (audio && !audio.paused) {
        audio.pause();
        window.audioPausedForAIAssistant = true;
      }
      var video = document.querySelector('video.video-player');
      if (video && !video.paused) {
        video.pause();
        window.videoPausedForAIAssistant = true;
      }

      setTimeout(() => {
        var inp = document.getElementById('chat-input');
        if(inp) inp.focus();
      }, 300);
      scrollChat();
    } else {
      // إعادة تشغيل الصوت/الفيديو عند إغلاق المساعد الذكي
      var audio = document.getElementById('topAudio');
      if (audio && window.audioPausedForAIAssistant) {
        audio.play().catch(function(e){ console.log('[Chat] Autoplay blocked:', e); });
        window.audioPausedForAIAssistant = false;
      }
      var video = document.querySelector('video.video-player');
      if (video && window.videoPausedForAIAssistant) {
        video.play().catch(function(e){ console.log('[Chat] Autoplay blocked:', e); });
        window.videoPausedForAIAssistant = false;
      }

      if (isRecognizing) {
        recognition.stop();
      }
    }
  };

  window.sendChat = function() {
    if (chatLoading) return;
    if (isRecognizing) recognition.stop();

    var inp = document.getElementById('chat-input');
    var msg = (inp ? inp.value : '').trim();
    if (!msg) return;

    if (chatRemaining <= 0) {
      appendMsg('bot', 'لقد استهلكت محاولاتك اليوم، نراك غداً بنشاط جديد!');
      return;
    }

    inp.value = '';
    inp.style.height = 'auto';
    appendMsg('user', msg);

    chatLoading = true;
    var sendBtn = document.getElementById('chat-send');
    if(sendBtn) sendBtn.disabled = true;
    
    var tid = 'typing_' + Date.now();
    showTyping(tid);

    fetch(_chatUrl, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-CSRFToken': _csrf,
        'X-Requested-With': 'XMLHttpRequest'
      },
      body: JSON.stringify({ message: msg, history: chatHistory.slice(-6) })
    })
    .then(r => r.json())
    .then(data => {
      removeTyping(tid);
      chatLoading = false;
      if(sendBtn) sendBtn.disabled = false;

      if (data.ok) {
        appendMsg('bot', data.reply, false, true);
        chatHistory.push({role:'user', parts:[{text:msg}]});
        chatHistory.push({role:'model', parts:[{text:data.reply}]});
        if (data.remaining !== undefined) updateQuotaUI(data.remaining);
      } else {
        appendMsg('bot', data.reply || 'حدث خطأ ما.', true);
      }
    })
    .catch(() => {
      removeTyping(tid);
      chatLoading = false;
      if(sendBtn) sendBtn.disabled = false;
      appendMsg('bot', 'خطأ في الاتصال.', true);
    });
  };

  function updateQuotaUI(rem) {
    if (rem !== undefined) chatRemaining = rem;
    var badge = document.getElementById('chat-quota-badge');
    if(badge) badge.textContent = Math.max(0, chatRemaining) + ' رسالة متبقية';
  }

  function cleanBotText(text) {
    // إزالة الإيموجي والرموز غير المرغوبة مع الحفاظ على علامات الترقيم العربية
    var cleanText = text
      // إزالة النص بين علامات النجمة المزدوجة **
      .replace(/\*\*[^*]+\*\*/g, '')
      // إزالة الإيموجي
      .replace(/[\u{1F600}-\u{1F64F}]/gu, '') // emoticons
      .replace(/[\u{1F300}-\u{1F5FF}]/gu, '') // symbols & pictographs
      .replace(/[\u{1F680}-\u{1F6FF}]/gu, '') // transport & map symbols
      .replace(/[\u{1F700}-\u{1F77F}]/gu, '') // alchemical symbols
      .replace(/[\u{1F780}-\u{1F7FF}]/gu, '') // Geometric Shapes Extended
      .replace(/[\u{1F800}-\u{1F8FF}]/gu, '') // Supplemental Arrows-C
      .replace(/[\u{1F900}-\u{1F9FF}]/gu, '') // Supplemental Symbols and Pictographs
      .replace(/[\u{1FA00}-\u{1FA6F}]/gu, '') // Chess Symbols
      .replace(/[\u{1FA70}-\u{1FAFF}]/gu, '') // Symbols and Pictographs Extended-A
      .replace(/[\u{2600}-\u{26FF}]/gu, '')   // misc symbols
      .replace(/[\u{2700}-\u{27BF}]/gu, '')   // dingbats
      // إزالة الرموز الخاصة
      .replace(/[★☆✓✗✓✔✕❌❎⭕❌]/g, '')
      .replace(/[⭐🌟💫]/g, '')
      .replace(/[🔥💪🎯📚✨🎉]/g, '')
      // إزالة الحروف الإنجليزية
      .replace(/[a-zA-Z]/g, '')
      // تنظيف المسافات الزائدة
      .replace(/\s+/g, ' ')
      .trim();
    
    return cleanText;
  }

  function appendMsg(type, text, isErr, isNewBotMsg) {
    var m = document.getElementById('chat-messages');
    if(!m) return;
    var d = document.createElement('div');
    d.className = 'chat-msg ' + type + (isErr ? ' error-msg' : '');
    
    // تنظيف النص من الإيموجي والرموز
    var cleanText = cleanBotText(text);
    
    // إضافة زر تشغيل الصوت لرسائل البوت
    if (type === 'bot' && !isErr) {
      d.innerHTML = `
        <div class="msg-content">${cleanText}</div>
        <button class="voice-btn" onclick="playMessageVoice(this)" title="تشغيل الصوت">
          <i class="fas fa-volume-up"></i>
        </button>
      `;
      
      // تشغيل الصوت تلقائياً للرسائل الجديدة من البوت
      if (isNewBotMsg && cleanText) {
        setTimeout(function() {
          var btn = d.querySelector('.voice-btn');
          if (btn) {
            playMessageVoice(btn);
          }
        }, 500);
      }
    } else {
      d.innerText = cleanText;
    }
    
    m.appendChild(d);
    scrollChat();
  }

  function showTyping(id) {
    var m = document.getElementById('chat-messages');
    if(!m) return;
    var d = document.createElement('div');
    d.className = 'chat-msg bot'; d.id = id;
    d.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
    m.appendChild(d);
    scrollChat();
  }

  function removeTyping(id) { var e = document.getElementById(id); if(e) e.remove(); }
  
  function scrollChat() {
    var m = document.getElementById('chat-messages');
    if(m) m.scrollTo({ top: m.scrollHeight, behavior: 'smooth' });
  }

  window.handleChatKey = function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); window.sendChat(); }
  };

  window.autoResize = function(el) {
    el.style.height = 'auto';
    el.style.height = el.scrollHeight + 'px';
  };

  document.addEventListener('DOMContentLoaded', function() {
    var title = document.getElementById('chat-lesson-title');
    if(title) title.textContent = _cfg.dataset.lessonTitle;
    updateQuotaUI();
    initSpeech(); // تهيئة النظام عند التحميل
  });
})();
</script>
