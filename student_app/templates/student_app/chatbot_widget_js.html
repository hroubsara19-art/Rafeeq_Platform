{# student_app/templates/student_app/chatbot_widget_js.html #}
<script>
(function(){
'use strict';

/* ══════════════════════════════════════════════════════
   1. قراءة الإعدادات من data-* (الطريقة الآمنة والصحيحة)
   ══════════════════════════════════════════════════════ */
var _cfg = document.getElementById('chat-config');

var _chatUrl   = _cfg ? _cfg.dataset.chatUrl   : '';
var _csrf      = _cfg ? _cfg.dataset.csrf       : '';
var _chatLimit = _cfg ? parseInt(_cfg.dataset.limit || '20') : 20;
var _chatUsed  = _cfg ? parseInt(_cfg.dataset.used  || '0')  : 0;
var _lessonTitle = _cfg ? (_cfg.dataset.lessonTitle || 'الدرس') : 'الدرس';

/* ══════════════════════════════════════════════════════
   2. الحالة الداخلية
   ══════════════════════════════════════════════════════ */
var chatOpen      = false;
var chatLoading   = false;
var chatRemaining = _chatLimit - _chatUsed;
var currentAudio = null; // لتخزين كائن الصوت النشط

/*
 * ✅ التعديل الجوهري:
 * chatHistory يخزَّن بصيغة {role, parts:[{text}]}
 * وهي الصيغة الوحيدة التي يفهمها chat_views.py
 * (السيرفر يقرأ h['parts'][0]['text'] أو h['text'])
 */
var chatHistory = [];

/* ══════════════════════════════════════════════════════
   3. نظام التعرف على الكلام (Speech Recognition)
   ══════════════════════════════════════════════════════ */
var recognition = null;
var isRecognizing = false;

function initSpeech() {
    if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) return;
    
    var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SpeechRecognition();
    recognition.lang = 'ar-SA';
    recognition.interimResults = true;
    recognition.continuous = false;

    recognition.onstart = function() {
        isRecognizing = true;
        var btn = document.getElementById('chat-mic-btn');
        if (btn) btn.classList.add('active');
    };

    recognition.onresult = function(event) {
        var transcript = "";
        for (var i = event.resultIndex; i < event.results.length; ++i) {
            transcript += event.results[i][0].transcript;
        }
        var inp = document.getElementById('chat-input');
        if (inp) {
            inp.value = transcript;
            window.autoResize(inp);
        }
    };

    recognition.onerror = function(event) {
        console.log('[Chat] Speech recognition error:', event.error);
        stopSpeechUI();
    };

    recognition.onend = function() {
        stopSpeechUI();
    };
}

function startSpeech() {
    if (!recognition) initSpeech();
    if (!recognition) return;
    try {
        recognition.start();
    } catch(e) {
        console.log('[Chat] Speech already started');
    }
}

function stopSpeechUI() {
    isRecognizing = false;
    var btn = document.getElementById('chat-mic-btn');
    if (btn) btn.classList.remove('active');
}

/* ══════════════════════════════════════════════════════
   4. نظام توليد الصوت (Text-to-Speech)
   ══════════════════════════════════════════════════════ */
async function playRafiqVoice(text) {
    try {
        // إيقاف أي صوت نشط
        if (currentAudio) {
            currentAudio.pause();
            currentAudio.currentTime = 0;
            currentAudio = null;
        }

        const response = await fetch('/api/generate-voice/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text: text })
        });

        if (!response.ok) throw new Error('Voice generation failed');

        const audioBlob = await response.blob();
        const audioUrl = URL.createObjectURL(audioBlob);
        const audio = new Audio(audioUrl);
        
        currentAudio = audio;

        return new Promise((resolve, reject) => {
            audio.addEventListener('ended', () => {
                URL.revokeObjectURL(audioUrl);
                currentAudio = null;
                resolve();
            });
            audio.addEventListener('error', (e) => {
                URL.revokeObjectURL(audioUrl);
                currentAudio = null;
                reject(e);
            });
            audio.play().catch(err => {
                console.log(err);
                currentAudio = null;
                reject(err);
            });
        });

    } catch (error) {
        console.error('Error playing voice:', error);
        currentAudio = null;
    }
}

function stopVoice() {
    if (currentAudio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
        currentAudio = null;
    }
}

// تشغيل صوت رسالة معينة مع تظليل الكلمات
window.playMessageVoice = function(btn) {
    var msgDiv = btn.closest('.chat-msg');
    var contentDiv = msgDiv.querySelector('.msg-content');
    var text = contentDiv ? contentDiv.innerText : '';
    
    if (!text) return;
    
    // إذا كان الصوت يعمل، أوقفه
    if (btn.classList.contains('playing')) {
        stopVoice();
        btn.classList.remove('playing');
        // إعادة النص الأصلي
        if (contentDiv) contentDiv.innerText = text;
        return;
    }
    
    // إيقاف أي صوت نشط
    stopVoice();
    
    // تغيير حالة الزر
    document.querySelectorAll('.voice-btn').forEach(function(b) {
        b.classList.remove('playing');
    });
    btn.classList.add('playing');
    
    // تقسيم النص إلى كلمات للتظليل
    var words = text.split(/\s+/);
    contentDiv.innerHTML = words.map(function(word, index) {
        return '<span class="word" data-index="' + index + '">' + word + '</span>';
    }).join(' ');
    
    // تشغيل الصوت
    playRafiqVoice(text).then(function() {
        btn.classList.remove('playing');
        // إعادة النص الأصلي
        contentDiv.innerText = text;
    }).catch(function() {
        btn.classList.remove('playing');
        contentDiv.innerText = text;
    });
    
    // تظليل الكلمات بشكل متتابع (تقريبي)
    var wordElements = contentDiv.querySelectorAll('.word');
    var duration = 3000; // تقدير مدة الصوت بالمللي ثانية
    var wordDelay = duration / words.length;
    
    wordElements.forEach(function(wordEl, index) {
        setTimeout(function() {
            wordElements.forEach(function(w) {
                w.classList.remove('highlighted');
            });
            wordEl.classList.add('highlighted');
        }, index * wordDelay);
    });
};

/* ══════════════════════════════════════════════════════
   5. تهيئة عنوان الدرس وشارة الكوتا
   ══════════════════════════════════════════════════════ */
function initUI() {
    var titleEl = document.getElementById('chat-lesson-title');
    if (titleEl) titleEl.textContent = _lessonTitle;
    updateQuotaUI();
}

function updateQuotaUI(rem) {
    if (rem !== undefined) chatRemaining = rem;
    var rem2  = Math.max(0, chatRemaining);
    var badge = document.getElementById('chat-quota-badge');
    if (badge) {
        badge.textContent = rem2 + ' رسالة متبقية';
        badge.style.color = rem2 <= 5 ? '#fca5a5' : 'rgba(255,255,255,.85)';
    }
}

/* ══════════════════════════════════════════════════════
   6. فتح وإغلاق النافذة
   ══════════════════════════════════════════════════════ */
window.toggleChat = function() {
    chatOpen = !chatOpen;
    var panel = document.getElementById('chat-panel');
    var fab   = document.getElementById('chat-fab');
    if (!panel) return;

    panel.classList.toggle('open', chatOpen);
    
    if (chatOpen) {
        // إخفاء الأيقونة عند فتح الشات
        if (fab) fab.style.display = 'none';
        
        // إيقاف الصوت عند فتح المساعد الذكي
        stopVoice();
        
        // إيقاف تتبع الانتباه إذا كان يعمل
        if (typeof stopAttentionTracking === 'function') {
            stopAttentionTracking();
        }
        
        // إيقاف التسجيل الصوتي إذا كان يعمل
        if (isRecognizing) {
            recognition.stop();
        }

        // إيقاف الصوت/الفيديو عند فتح المساعد الذكي
        var audio = document.getElementById('topAudio');
        if (audio && !audio.paused) {
            audio.pause();
            window.audioPausedForAIAssistant = true;
        }
        var video = document.querySelector('video.video-player');
        if (video && !video.paused) {
            video.pause();
            window.videoPausedForAIAssistant = true;
        }

        setTimeout(function() {
            var inp = document.getElementById('chat-input');
            if (inp) inp.focus();
            scrollChat();
        }, 300);
    } else {
        // إظهار الأيقونة عند إغلاق الشات
        if (fab) fab.style.display = 'flex';

        // إعادة تشغيل الصوت/الفيديو عند إغلاق المساعد الذكي
        var audio = document.getElementById('topAudio');
        if (audio && window.audioPausedForAIAssistant) {
            audio.play().catch(function(e){ console.log('[Chat] Autoplay blocked:', e); });
            window.audioPausedForAIAssistant = false;
        }
        var video = document.querySelector('video.video-player');
        if (video && window.videoPausedForAIAssistant) {
            video.play().catch(function(e){ console.log('[Chat] Autoplay blocked:', e); });
            window.videoPausedForAIAssistant = false;
        }
    }
};

/* ══════════════════════════════════════════════════════
   5. إرسال الرسالة — الدالة الرئيسية
   ══════════════════════════════════════════════════════ */
window.sendChat = function() {
    if (chatLoading) return;

    var inp = document.getElementById('chat-input');
    var msg = (inp ? inp.value : '').trim();
    if (!msg) return;

    /* فحص الكوتا */
    if (chatRemaining <= 0) {
        appendMsg('bot', 'لقد استهلكت محاولاتك اليوم، نراك غداً بنشاط جديد!');
        return;
    }

    /* تجهيز الواجهة */
    inp.value = '';
    inp.style.height = 'auto';
    appendMsg('user', msg);

    chatLoading = true;
    var sendBtn = document.getElementById('chat-send');
    if (sendBtn) sendBtn.disabled = true;

    var typingId = 'typing_' + Date.now();
    showTyping(typingId);

    /*
     * ✅ إرسال history بالصيغة الصحيحة التي يتوقعها chat_views.py:
     *    [{role: 'user',  parts: [{text: '...'}]},
     *     {role: 'model', parts: [{text: '...'}]}, ...]
     *
     * السيرفر في chat_views.py يقرأ:
     *   h.get('parts')[0].get('text')  ← الصيغة الأساسية
     *   h.get('text')                  ← fallback
     * كلا الصيغتين تعمل — نستخدم parts لأنها الأولوية
     */
    var historyToSend = chatHistory.slice(-6);

    fetch(_chatUrl, {
        method:  'POST',
        headers: {
            'Content-Type':     'application/json',
            'X-CSRFToken':      _csrf,
            'X-Requested-With': 'XMLHttpRequest',
        },
        body: JSON.stringify({
            message: msg,
            history: historyToSend,
        }),
    })
    .then(function(response) {
        /* ✅ نقرأ الـ JSON دائماً حتى عند الخطأ لاستخراج رسالة واضحة */
        return response.json().then(function(data) {
            return { status: response.status, data: data };
        });
    })
    .then(function(result) {
        removeTyping(typingId);
        chatLoading = false;
        if (sendBtn) sendBtn.disabled = false;

        var data   = result.data;
        var status = result.status;

        /* ✅ تحديد نوع الرسالة */
        if (data.ok) {
            /* رد ناجح */
            appendMsg('bot', data.reply, false, true);
        } else if (status === 429 || data.quota_exceeded) {
            /* تجاوز الحصة */
            appendMsg('bot', '🌟 ' + (data.error || 'وصلت للحد اليومي. عد غداً!'));
            chatRemaining = 0;
            updateQuotaUI(0);
            return;
        } else if (status === 503 && data.reply) {
            /* API غير متاح — نعرض الرد الودي */
            appendMsg('bot', data.reply);
            return;
        } else {
            /* أي خطأ آخر */
            var errMsg = data.reply || data.error || 'عذراً، حدث خطأ غير متوقع. حاول مرة أخرى.';
            appendMsg('bot', errMsg, true);
            return;
        }

        /* ✅ تحديث history بالصيغة الصحيحة */
        chatHistory.push({ role: 'user',  parts: [{ text: msg }] });
        chatHistory.push({ role: 'model', parts: [{ text: data.reply }] });

        /* الاحتفاظ بآخر 12 رسالة فقط (6 أزواج) */
        if (chatHistory.length > 12) {
            chatHistory = chatHistory.slice(-12);
        }

        /* تحديث الكوتا */
        if (data.remaining !== undefined) {
            updateQuotaUI(data.remaining);
        } else if (!data.is_out_of_scope) {
            /* لا نخصم إذا كان السؤال خارج الدرس */
            chatRemaining = Math.max(0, chatRemaining - 1);
            updateQuotaUI();
        }
    })
    .catch(function(err) {
        removeTyping(typingId);
        chatLoading = false;
        if (sendBtn) sendBtn.disabled = false;
        appendMsg('bot', 'تعذّر الاتصال بالسيرفر — تحقق من الإنترنت وأعد المحاولة.', true);
        console.error('[Chat] fetch error:', err);
    });
};

/* ══════════════════════════════════════════════════════
   6. أدوات الواجهة
   ══════════════════════════════════════════════════════ */

function cleanBotText(text) {
    // إزالة الإيموجي والرموز غير المرغوبة مع الحفاظ على علامات الترقيم العربية
    var cleanText = text
      // إزالة النص بين علامات النجمة المزدوجة **
      .replace(/\*\*[^*]+\*\*/g, '')
      // إزالة الإيموجي
      .replace(/[\u{1F600}-\u{1F64F}]/gu, '') // emoticons
      .replace(/[\u{1F300}-\u{1F5FF}]/gu, '') // symbols & pictographs
      .replace(/[\u{1F680}-\u{1F6FF}]/gu, '') // transport & map symbols
      .replace(/[\u{1F700}-\u{1F77F}]/gu, '') // alchemical symbols
      .replace(/[\u{1F780}-\u{1F7FF}]/gu, '') // Geometric Shapes Extended
      .replace(/[\u{1F800}-\u{1F8FF}]/gu, '') // Supplemental Arrows-C
      .replace(/[\u{1F900}-\u{1F9FF}]/gu, '') // Supplemental Symbols and Pictographs
      .replace(/[\u{1FA00}-\u{1FA6F}]/gu, '') // Chess Symbols
      .replace(/[\u{1FA70}-\u{1FAFF}]/gu, '') // Symbols and Pictographs Extended-A
      .replace(/[\u{2600}-\u{26FF}]/gu, '')   // misc symbols
      .replace(/[\u{2700}-\u{27BF}]/gu, '')   // dingbats
      // إزالة الرموز الخاصة
      .replace(/[★☆✓✗✓✔✕❌❎⭕❌]/g, '')
      .replace(/[⭐🌟💫]/g, '')
      .replace(/[🔥💪🎯📚✨🎉]/g, '')
      // إزالة الحروف الإنجليزية
      .replace(/[a-zA-Z]/g, '')
      // تنظيف المسافات الزائدة
      .replace(/\s+/g, ' ')
      .trim();
    
    return cleanText;
}

/* إضافة رسالة — isError اختياري لتلوين الفقاعة بالأحمر */
function appendMsg(type, text, isError, isNewBotMsg) {
    var msgsEl = document.getElementById('chat-messages');
    if (!msgsEl) return;

    var div = document.createElement('div');
    var cls = 'chat-msg ' + (type === 'user' ? 'user' : 'bot');
    if (isError) cls += ' error-msg';
    div.className = cls;

    // تنظيف النص من الإيموجي والرموز
    var cleanText = cleanBotText(text);
    
    // إضافة زر تشغيل الصوت لرسائل البوت
    if (type === 'bot' && !isError) {
        div.innerHTML = `
            <div class="msg-content">${cleanText}</div>
            <button class="voice-btn" onclick="playMessageVoice(this)" title="تشغيل الصوت">
                <i class="fas fa-volume-up"></i>
            </button>
        `;
        
        // تشغيل الصوت تلقائياً للرسائل الجديدة من البوت
        if (isNewBotMsg && cleanText) {
            setTimeout(function() {
                var btn = div.querySelector('.voice-btn');
                if (btn) {
                    playMessageVoice(btn);
                }
            }, 500);
        }
    } else {
        div.innerText = cleanText;
    }
    
    msgsEl.appendChild(div);
    scrollChat();
}

/* مؤشر التفكير (ثلاث نقاط متحركة) */
function showTyping(id) {
    var msgsEl = document.getElementById('chat-messages');
    if (!msgsEl) return;
    var div = document.createElement('div');
    div.className = 'chat-msg bot';
    div.id = id;
    div.innerHTML =
        '<div class="typing-dots">' +
        '<span></span><span></span><span></span>' +
        '</div>';
    msgsEl.appendChild(div);
    scrollChat();
}

function removeTyping(id) {
    var el = document.getElementById(id);
    if (el) el.remove();
}

function scrollChat() {
    var msgsEl = document.getElementById('chat-messages');
    if (msgsEl) msgsEl.scrollTo({ top: msgsEl.scrollHeight, behavior: 'smooth' });
}

/* ══════════════════════════════════════════════════════
   7. أحداث لوحة المفاتيح وتغيير الحجم
   ══════════════════════════════════════════════════════ */
window.handleChatKey = function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        window.sendChat();
    }
};

window.toggleSpeech = function() {
    if (!recognition) initSpeech();
    if (!recognition) {
        alert("متصفحك لا يدعم التعرف على الصوت.");
        return;
    }

    if (isRecognizing) {
        recognition.stop();
    } else {
        try {
            recognition.start();
        } catch (e) {
            console.error("Mic start error:", e);
        }
    }
};

window.autoResize = function(el) {
    el.style.height = 'auto';
    el.style.height = el.scrollHeight + 'px';
};

/* ══════════════════════════════════════════════════════
   8. تهيئة عند تحميل الصفحة
   ══════════════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', function() {
    initUI();
    initSpeech();
});

/* ══════════════════════════════════════════════════════
   9. CSS إضافي للزر الصوت وتظليل الكلمات
   ══════════════════════════════════════════════════════ */
var style = document.createElement('style');
style.textContent = `
.chat-msg{
  position:relative;
}
.msg-content{
  margin-right:30px;
}
.voice-btn{
  position:absolute;
  top:5px;
  left:5px;
  width:24px;
  height:24px;
  border:none;
  background:rgba(49,91,89,.1);
  color:#315b59;
  border-radius:50%;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:.7rem;
  transition:all .2s ease;
}
.voice-btn:hover{
  background:rgba(49,91,89,.2);
  transform:scale(1.1);
}
.voice-btn.playing{
  background:#315b59;
  color:#fff;
  animation:pulse 1.5s infinite;
}
@keyframes pulse{
  0%,100%{transform:scale(1);}

}
.word{
  display:inline;
  transition:background .2s ease,color .2s ease;
  padding:0 2px;

}
.word.highlighted{
  background:rgba(49,91,89,.15);
  color:#315b59;
  font-weight:600;
}
`;
document.head.appendChild(style);

})();
</script>
