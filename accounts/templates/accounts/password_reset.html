{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استعادة الحساب | منصة رفيق</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f0f4f8;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
        }

        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            isolation: isolate;
            overflow: hidden;
            padding: clamp(72px, 9vw, 120px) 20px;
            scroll-margin-top: 20px;
            background:
                radial-gradient(circle at 8% 18%, rgba(223, 129, 90, .1), transparent 20%),
                radial-gradient(circle at 92% 86%, rgba(79, 133, 131, .12), transparent 24%),
                linear-gradient(180deg, #edf1e9 0%, #f7f3eb 18%, #f4f1ea 100%);
        }

        .main-content::before,
        .main-content::after {
            content: "";
            position: absolute;
            z-index: -1;
            pointer-events: none;
            border-radius: 50%;
        }

        .main-content::before {
            width: 280px;
            height: 280px;
            top: 9%;
            right: -165px;
            border: 1px solid rgba(79, 133, 131, .15);
            box-shadow: 0 0 0 42px rgba(255, 255, 255, .13);
        }

        .main-content::after {
            width: 120px;
            height: 120px;
            left: 7%;
            bottom: 10%;
            background: rgba(242, 189, 91, .1);
        }

        .main-wrapper {
            position: relative;
            background: rgba(255, 255, 255, .86);
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(79, 133, 131, .14);
            border-radius: 28px;
            overflow: hidden;
            box-shadow:
                0 28px 70px rgba(64, 58, 50, .1),
                0 8px 20px rgba(79, 133, 131, .06);
            max-width: 500px;
            width: 100%;
            backdrop-filter: blur(14px);
        }

        .main-wrapper::before {
            content: "";
            position: absolute;
            inset: 0 0 auto;
            z-index: 2;
            height: 5px;
            background: linear-gradient(90deg, #4f8583, #80aaa0 48%, #df815a 76%, #f2bd5b);
        }

        .reset-container {
            position: relative;
            z-index: 1;
            width: 100%;
            padding: clamp(34px, 5vw, 58px);
        }

        @media (max-width: 992px) {
            .main-wrapper { max-width: 550px; }
            .main-content { padding: clamp(40px, 6vw, 80px) 15px; }
        }

        @media (max-width: 576px) {
            .main-wrapper { 
                max-width: 100%; 
                margin: 0 10px;
                border-radius: 20px;
            }
            .reset-container { padding: clamp(25px, 5vw, 40px); }
            .main-content { padding: 30px 10px; }
        }

        @media (max-width: 400px) {
            .main-wrapper { margin: 0; border-radius: 0; }
            .main-content { padding: 20px 0; }
        }

        .reset-container form {
            width: 100%;
        }

        .reset-container form > .mb-3 {
            margin-bottom: 18px !important;
        }

        .reset-container .btn-primary {
            min-height: 52px;
            padding: 12px 20px;
            border: 0;
            border-radius: 14px;
            background: #4f8583;
            color: #fff;
            font-weight: 700;
            box-shadow: 0 12px 26px rgba(79, 133, 131, .2);
            transition: transform .2s ease, box-shadow .2s ease, background .2s ease;
            width: 100%;
        }

        .reset-container .btn-primary:hover,
        .reset-container .btn-primary:focus {
            background: #447775;
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 16px 30px rgba(79, 133, 131, .26);
        }

        .reset-container .btn-primary:disabled {
            background: #789a92;
            transform: none;
            box-shadow: none;
            opacity: .82;
        }

        .form-control {
            padding: 14px 16px;
            border-radius: 12px;
            border: 1.5px solid #e5e7eb;
            font-size: 15px;
            transition: all .3s ease;
        }

        .form-control:focus {
            border-color: #4f8583;
            box-shadow: 0 0 0 3px rgba(79, 133, 131, .1);
        }

        .brand-icon {
            font-size: 48px;
            color: #4f8583;
            margin-bottom: 20px;
            display: block;
        }

        .page-title {
            font-size: clamp(22px, 4vw, 28px);
            font-weight: 700;
            color: #1e3a5f;
            margin-bottom: 12px;
        }

        .page-description {
            color: #64748b;
            font-size: 15px;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .back-link {
            color: #4f8583;
            text-decoration: none;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: color .2s ease;
        }

        .back-link:hover {
            color: #447775;
        }
    </style>
</head>
<body>
    <div class="main-content">
        <div class="main-wrapper">
            <div class="reset-container">
                <i class="fas fa-key brand-icon"></i>
                <h2 class="page-title">نسيت كلمة المرور؟</h2>
                <p class="page-description">أدخل بريدك الإلكتروني وسنرسل لك رابطاً لإعادة تعيين كلمة المرور الخاصة بك.</p>
                
                <form method="post" id="resetForm">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="email" class="form-label fw-bold mb-2" style="color: #374151;">البريد الإلكتروني</label>
                        <input type="email" name="email" id="email" class="form-control" placeholder="example@gmail.com" required>
                    </div>
                    <button type="submit" class="btn btn-primary" id="submitBtn">
                        <i class="fas fa-paper-plane me-2"></i>إرسال الرابط
                    </button>
                </form>

                <div class="text-center mt-4">
                    <a href="{% url 'accounts:login' %}" class="back-link">
                        <i class="fas fa-arrow-right"></i> العودة لتسجيل الدخول
                    </a>
                </div>
            </div>
        </div>
    </div>

    {% include 'includes/_footer.html' %}

    <script>
        document.getElementById('resetForm').addEventListener('submit', function () {
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>جارٍ الإرسال...';
        });
    </script>
</body>
</html>
